<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCC202 Aula 06: Tabelas</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
</head>
<body>
    <h1>DCC202 Aula 06: Tabelas</h1>
    <p>Tabelas são <a href="index.html">elementos básicos</a> para adicionar dados multivariados na sua página. São diferentes das <a href="listas.html">listas</a> que possuem uma única dimensão </p>
    <table>
        <thead>
            <tr>
                <th>Texto 1</th>
                <th>Texto 2</th>
                <th>Texto 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Dado 1</td>
                <td>Dado 2</td>
                <td>Dado 3</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
